<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="/favicon.png" type="image/png">
    <meta charset="UTF-8">
    <title>Админ-панель ВМФ</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        form { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 24px; 
            max-width: 500px; 
            margin: 50px auto; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0,0,0,0.08);
            backdrop-filter: blur(10px);
        }
        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--black-premium);
            outline: none;
        }
        form h2 {
            font-weight: 800;
            text-align: center;
            margin-top: 0;
            font-size: 24px;
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body class="andreev-bg">
    <!-- Идентичная шапка, навигация больше не пропадает! -->
    <header>
        <div class="container header-container">
            <div class="logo">⚓ ВМФ ТОРГ (АДМИН)</div>
            <nav>
                <a href="/">Каталог</a>
                <a href="/admin.html">Админ-панель</a>
            </nav>
            <div style="width: 100px;"></div> <!-- Заглушка для симметрии -->
        </div>
    </header>

    <main class="container">
        <form id="add-product-form">
            <h2>Добавить новый товар</h2>
            <input type="text" id="name" placeholder="Название товара" required>
            <select id="category">
                <option value="telyashka">Тельняшка</option>
                <option value="beret">Берет</option>
                <option value="accessories">Аксессуары</option>
            </select>
            <input type="number" id="price" placeholder="Цена (руб.)" required>
            <input type="text" id="image" placeholder="Путь к картинке (например: /images/beret.png)">
            <textarea id="description" placeholder="Описание товара"></textarea>
            <button type="submit" class="btn" style="width: 100%;">Добавить на склад</button>
        </form>
    </main>

    <script>
        document.getElementById('add-product-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const product = {
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                price: document.getElementById('price').value,
                image: document.getElementById('image').value || '/images/telnyashka_winter.png',
                description: document.getElementById('description').value
            };

            fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(product)
            })
            .then(res => {
                if(res.ok) {
                    alert('Товар успешно добавлен!');
                    window.location.href = '/';
                }
            });
        });
    </script>
</body>
</html>
